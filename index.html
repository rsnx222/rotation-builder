<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PvME Rotation Builder</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@forevolve/bootstrap-dark@1.1.0/dist/css/bootstrap-dark.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container app-container">
      <header class="app-header">
        <div style="display: flex; align-items: center; gap: 10px">
          <img
            src="https://img.pvme.io/images/EPzzJe2xy6.gif"
            alt="PVME"
            style="
              height: 50px;
              width: auto;
              pointer-events: none;
              user-select: none;
            "
          />
          <h1 class="app-title">PvME Rotation Builder</h1>
        </div>

        <div class="toolbar">
          <button id="changeView" class="btn btn-secondary btn-sm">
            <i class="bi bi-layout-split"></i> Toggle Layout
          </button>

          <a
            href="https://pvme.io/pvme-settings/"
            target="_blank"
            class="btn btn-secondary btn-sm"
          >
            <i class="bi bi-box-arrow-up-right"></i> Emoji List
          </a>
        </div>
      </header>

      <div class="row editor-row">
        <div id="inputContainer" class="col-md-6">
          <div class="pane">
            <div class="pane-header">Input</div>

            <div class="pane-body input-wrapper">
              <textarea
                id="input"
                class="form-control editor"
                spellcheck="false"
                placeholder="barge -> assault -> destroy"
              ></textarea>

              <div id="caretMirror"></div>

              <div class="toolbar">
                <div class="toggle">
                  <input type="checkbox" id="autoArrowToggle" checked />
                  <label for="autoArrowToggle">
                    <span class="toggle-track"></span>
                    <span class="toggle-label"
                      >Insert → between emojis automatically</span
                    >
                  </label>
                </div>
              </div>

              <div id="suggestions"></div>
            </div>
          </div>
        </div>

        <div id="outputContainer" class="col-md-6">
          <div class="pane">
            <div class="pane-header">Preview</div>

            <div class="pane-body">
              <div id="output"></div>

              <div class="toolbar">
                <button id="copyDiscord" class="btn btn-primary btn-sm">
                  <i class="bi bi-clipboard"></i> Copy to clipboard
                </button>

                <button id="exportToTxt" class="btn btn-secondary btn-sm">
                  <i class="bi bi-download"></i> Export as .txt
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="info-section">
        <table class="table table-md">
          <thead>
            <tr>
              <th>Input</th>
              <th>Formatted</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>-></td>
              <td>→</td>
            </tr>

            <tr>
              <td>gbarge, greaterbarge</td>
              <td>
                <img
                  class="disc-emoji"
                  src="https://cdn.discordapp.com/emojis/535532879250456578.png?v=1"
                />
                <img
                  class="disc-emoji"
                  src="https://cdn.discordapp.com/emojis/535532879250456578.png?v=1"
                />
              </td>
            </tr>

            <tr>
              <td>&lt;:piercing:535541258538450944&gt;</td>
              <td>
                <img
                  class="disc-emoji"
                  src="https://cdn.discordapp.com/emojis/535541258538450944.png?v=1"
                />
              </td>
            </tr>

            <tr>
              <td>sgb / SGB</td>
              <td>
                <img
                  class="disc-emoji"
                  src="https://cdn.discordapp.com/emojis/626466665848242186.png?v=1"
                />
                /
                <img
                  class="disc-emoji"
                  src="https://cdn.discordapp.com/emojis/626466665848242186.png?v=1"
                />
              </td>
            </tr>

            <tr>
              <td>
                u<strong><u>sing</u></strong> [using]
              </td>
              <td>
                u<img
                  class="disc-emoji"
                  src="https://cdn.discordapp.com/emojis/513190159261630467.png?v=1"
                />
                using
              </td>
            </tr>
          </tbody>
        </table>

        <table class="table table-md">
          <thead>
            <tr>
              <th>Key</th>
              <th>Description</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td><kbd>↑</kbd> <kbd>↓</kbd></td>
              <td>Cycle through suggestions</td>
            </tr>

            <tr>
              <td><kbd>Enter</kbd> / <kbd>→</kbd> / <kbd>tab</kbd></td>
              <td>Accept suggestion</td>
            </tr>

            <tr>
              <td><kbd>Space</kbd></td>
              <td>Close suggestions</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="js/application.js"></script>
  </body>
</html>
